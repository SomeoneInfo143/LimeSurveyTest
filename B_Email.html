<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --primary:           #e60023;
  --on-primary:        #ffffff;
  --primary-pressed:   #cc001f;
  --ink:               #000000;
  --ink-soft:          #211922;
  --body:              #33332e;
  --charcoal:          #262622;
  --mute:              #62625b;
  --ash:               #91918c;
  --stone:             #c8c8c1;
  --hairline:          #dadad3;
  --hairline-soft:     #e5e5e0;
  --on-secondary:      #000000;
  --secondary-bg:      #e5e5e0;
  --secondary-pressed: #c8c8c1;
  --canvas:            #ffffff;
  --surface-soft:      #fbfbf9;
  --surface-card:      #f6f6f3;
  --on-dark:           #ffffff;
  --surface-dark:      #262622;
  --focus-outer:       #435ee5;
  --focus-inner:       #ffffff;
  --rounded-sm:   8px;
  --rounded-md:   16px;
  --rounded-lg:   32px;
  --rounded-full: 9999px;
  --space-xxs:  4px;
  --space-xs:   6px;
  --space-sm:   8px;
  --space-md:   12px;
  --space-lg:   16px;
  --space-xl:   24px;
  --space-xxl:  32px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: var(--surface-soft);
  color: var(--body);
  padding: 24px 16px 48px;
  -webkit-font-smoothing: antialiased;
}

/* Card */
.card {
  background: var(--canvas);
  border-radius: var(--rounded-lg);
  max-width: 600px;
  margin: 0 auto;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.06);
}

/* Header — grayish surface-card bg */
.card-header {
  background: var(--surface-card);
  padding: var(--space-xxl) var(--space-xxl) var(--space-xl);
  border-bottom: 1px solid var(--hairline);
}
.header-eyebrow {
  font-size: 12px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--ash);
  margin-bottom: var(--space-xs);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.header-title {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -1.2px;
  color: var(--ink);
}

/* Body */
.card-body { padding: var(--space-xxl); }

/* Rule chips */
.rules-list { display: flex; flex-wrap: wrap; gap: var(--space-xs); margin-bottom: var(--space-lg); }
.rules-list:empty { display: none; }
.rule-chip {
  display: inline-flex; align-items: center; gap: var(--space-xs);
  background: var(--ink); color: var(--on-dark);
  font-size: 14px; font-weight: 700; line-height: 1;
  border-radius: var(--rounded-full);
  padding: 8px 10px 8px 16px;
  animation: chipIn 0.16s ease; max-width: 100%;
}
@keyframes chipIn { from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)} }
.rule-chip > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 230px; }
.rule-chip-remove {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border: none; border-radius: var(--rounded-full);
  background: rgba(255,255,255,0.15); color: var(--on-dark);
  font-size: 13px; cursor: pointer; flex-shrink: 0; transition: background 0.1s;
}
.rule-chip-remove:hover { background: rgba(255,255,255,0.28); }

/* Fields */
.field-group { margin-bottom: var(--space-lg); }
.field-label {
  display: block; font-size: 16px; font-weight: 600;
  line-height: 1.4; color: var(--ink); margin-bottom: var(--space-sm);
}

/* Inputs */
.card input[type="text"],
.card input[type="date"],
.card input[type="number"] {
  width: 100%; font-family: 'Inter', sans-serif;
  font-size: 16px; font-weight: 400; line-height: 1.4;
  color: var(--ink); background: var(--canvas);
  border: 1px solid var(--ash); border-radius: var(--rounded-md);
  padding: 11px 15px; height: 44px;
  outline: none; transition: border-color 0.12s, box-shadow 0.12s;
  -webkit-appearance: none;
}
.card input:focus {
  border-color: var(--ink); border-width: 2px;
  box-shadow: 0 0 0 2px var(--focus-inner), 0 0 0 5px var(--focus-outer);
}
.card input::placeholder { color: var(--ash); }

/* Divider */
.divider { height: 1px; background: var(--hairline); margin: var(--space-lg) 0; }

/* Date */
.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm); margin-bottom: var(--space-sm); }
.sub-label { font-size: 12px; font-weight: 500; color: var(--ash); display: block; margin-bottom: 5px; }
.or-divider {
  display: flex; align-items: center; gap: var(--space-sm); margin: var(--space-sm) 0;
  color: var(--ash); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em;
}
.or-divider::before, .or-divider::after { content:''; flex:1; height:1px; background:var(--hairline); }
.older-row { display: flex; align-items: center; gap: var(--space-sm); font-size: 16px; font-weight: 400; color: var(--mute); }
.older-row input[type="number"] { width: 72px !important; }

/* Checkboxes & radios — standard style with 2-col grid for content type */
.check-group { display: flex; flex-wrap: wrap; gap: var(--space-sm) var(--space-xl); }
.check-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm) var(--space-xl); }
.radio-group { display: flex; flex-wrap: wrap; gap: var(--space-sm) var(--space-xl); }
.check-item, .radio-item {
  display: flex; align-items: flex-start; gap: var(--space-xs);
  font-size: 14px; font-weight: 400; line-height: 1.4;
  color: var(--body); cursor: pointer; user-select: none;
}
.card input[type="checkbox"],
.card input[type="radio"] {
  width: 16px !important; height: 16px;
  accent-color: var(--primary); cursor: pointer; flex-shrink: 0; margin-top: 2px;
}

/* Exception */
.exc-btn {
  display: inline-flex; align-items: center; gap: var(--space-xs);
  background: transparent; border: none; color: var(--ink);
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; line-height: 1;
  border-radius: var(--rounded-md); padding: 8px 4px; cursor: pointer;
  text-decoration: underline; text-underline-offset: 2px;
  text-decoration-color: var(--hairline); transition: color 0.12s;
}
.exc-btn:hover { color: var(--ink-soft); }
.exc-block {
  display: none; margin-top: var(--space-sm);
  background: var(--surface-card); border: 1px solid var(--hairline);
  border-radius: var(--rounded-md); padding: var(--space-lg);
}
.exc-block.visible { display: block; }

/* Buttons */
.action-row { margin-top: var(--space-lg); display: flex; gap: var(--space-sm); align-items: center; }
.btn {
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; line-height: 1;
  border: none; border-radius: var(--rounded-md); cursor: pointer;
  transition: background 0.12s, transform 0.08s; white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  flex: 1; background: var(--primary); color: var(--on-primary);
  padding: 6px 14px; height: 40px;
}
.btn-primary:active { background: var(--primary-pressed); }
.btn-primary:disabled { background: var(--surface-card); color: var(--ash); cursor: not-allowed; transform: none; }
.btn-secondary {
  flex: 0 0 auto; background: var(--secondary-bg); color: var(--on-secondary);
  padding: 6px 14px; height: 40px;
}
.btn-secondary:active { background: var(--secondary-pressed); }
.btn-secondary:disabled { background: var(--surface-card); color: var(--ash); cursor: not-allowed; transform: none; }

.disclaimer { margin-top: var(--space-sm); font-size: 12px; font-weight: 400; line-height: 1.4; color: var(--ash); }

/* Preview */
.preview-panel {
  margin-top: var(--space-lg); border-top: 1px solid var(--hairline);
  padding-top: var(--space-lg); display: none; animation: fadeIn 0.2s ease;
}
.preview-panel.visible { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)} }
.preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); }
.preview-title { font-size: 12px; font-weight: 500; color: var(--ash); text-transform: uppercase; letter-spacing: 0.04em; }
.preview-count { font-size: 12px; font-weight: 400; color: var(--ash); }
.preview-row {
  display: flex; align-items: center; gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  background: var(--surface-card); border-radius: var(--rounded-md);
  margin-bottom: var(--space-xs); animation: rowIn 0.15s ease both;
}
.preview-row:nth-child(1){animation-delay:.03s}
.preview-row:nth-child(2){animation-delay:.07s}
.preview-row:nth-child(3){animation-delay:.11s}
@keyframes rowIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
.preview-avatar { width:32px; height:32px; border-radius:var(--rounded-full); background:var(--stone); flex-shrink:0; }
.preview-info { flex:1; min-width:0; }
.preview-sender { width:86px; height:7px; background:var(--stone); border-radius:var(--rounded-sm); margin-bottom:6px; opacity:0.6; }
.preview-subject { height:7px; background:var(--hairline); border-radius:var(--rounded-sm); }
.preview-date { width:44px; height:7px; background:var(--hairline); border-radius:var(--rounded-sm); flex-shrink:0; }
.preview-note { font-size:12px; font-weight:400; color:var(--ash); margin-top:var(--space-sm); text-align:center; }

/* Debug */
.debug-section { margin-top:var(--space-lg); padding-top:var(--space-lg); border-top:1px solid var(--hairline); }
.debug-label { font-size:12px; font-weight:500; color:var(--ash); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px; }
.debug-box {
  background: var(--surface-dark); color: #a8e6a3;
  font-family: ui-monospace, "SF Mono", monospace;
  font-size:11px; line-height:1.6;
  padding:var(--space-md) var(--space-lg);
  border-radius:var(--rounded-md);
  white-space:pre-wrap; word-break:break-all; min-height:36px;
}
</style>
</head>
<body>
<div class="card">

  <div class="card-header">
    <div class="header-eyebrow">Email</div>
    <div class="header-title">Interface B</div>
  </div>

  <div class="card-body">

    <div class="rules-list" id="rules-list"></div>

    <!-- Sender -->
    <div class="field-group">
      <label class="field-label">From (sender)</label>
      <input type="text" id="b-sender" placeholder="Email addresses or domains" oninput="anyChange()"/>
    </div>
    <div class="divider"></div>

    <!-- Date -->
    <div class="field-group">
      <label class="field-label">Date</label>
      <div class="date-row">
        <div><span class="sub-label">From</span><input type="date" id="b-date-from" onchange="clearOlder(); anyChange();"/></div>
        <div><span class="sub-label">To</span><input type="date" id="b-date-to" onchange="clearOlder(); anyChange();"/></div>
      </div>
      <div class="or-divider">or</div>
      <div class="older-row">
        <input type="radio" id="r-older" name="b-date-mode" value="older" onchange="anyChange()"/>
        <label for="r-older">Older than</label>
        <input type="number" id="b-older-years" min="1" max="50" placeholder="—" oninput="anyChange()"/>
        <span>years</span>
      </div>
    </div>
    <div class="divider"></div>

    <!-- Keywords -->
    <div class="field-group">
      <label class="field-label">Contains keywords</label>
      <input type="text" id="b-keywords" placeholder="Keywords to find" oninput="anyChange()"/>
    </div>
    <div class="divider"></div>

    <!-- Categories -->
    <div class="field-group">
      <label class="field-label">Categories / Labels</label>
      <div class="check-group">
        <label class="check-item"><input type="checkbox" id="cb-promo"  value="Promotional" onchange="anyChange()"/> Promotional</label>
        <label class="check-item"><input type="checkbox" id="cb-social" value="Social"      onchange="anyChange()"/> Social</label>
        <label class="check-item"><input type="checkbox" id="cb-work"   value="Work"        onchange="anyChange()"/> Work</label>
        <label class="check-item"><input type="checkbox" id="cb-other"  value="Other"       onchange="anyChange()"/> Other</label>
      </div>
    </div>
    <div class="divider"></div>

    <!-- Content Type — 2-column grid -->
    <div class="field-group">
      <label class="field-label">Content Type</label>
      <div class="check-grid">
        <label class="check-item"><input type="checkbox" id="ct-password"     value="Password resets / login codes"       onchange="anyChange()"/> Password resets / login codes</label>
        <label class="check-item"><input type="checkbox" id="ct-otp"          value="OTP / verification codes"            onchange="anyChange()"/> OTP / verification codes</label>
        <label class="check-item"><input type="checkbox" id="ct-banking"      value="Banking / financial"                 onchange="anyChange()"/> Banking / financial</label>
        <label class="check-item"><input type="checkbox" id="ct-medical"      value="Medical / health"                    onchange="anyChange()"/> Medical / health</label>
        <label class="check-item"><input type="checkbox" id="ct-shopping"     value="Shopping / purchase receipts"        onchange="anyChange()"/> Shopping / receipts</label>
        <label class="check-item"><input type="checkbox" id="ct-travel"       value="Travel receipts"                     onchange="anyChange()"/> Travel receipts</label>
        <label class="check-item"><input type="checkbox" id="ct-utility"      value="Utility bills"                       onchange="anyChange()"/> Utility bills</label>
        <label class="check-item"><input type="checkbox" id="ct-insurance"    value="Insurance"                           onchange="anyChange()"/> Insurance</label>
        <label class="check-item"><input type="checkbox" id="ct-subscription" value="Subscription confirmations"          onchange="anyChange()"/> Subscription confirmations</label>
        <label class="check-item"><input type="checkbox" id="ct-calendar"     value="Calendar invites (past / completed)" onchange="anyChange()"/> Calendar invites (past)</label>
        <label class="check-item"><input type="checkbox" id="ct-job"          value="Job application emails"              onchange="anyChange()"/> Job application emails</label>
        <label class="check-item"><input type="checkbox" id="ct-visa"         value="Visa / immigration documents"        onchange="anyChange()"/> Visa / immigration docs</label>
        <label class="check-item"><input type="checkbox" id="ct-political"    value="Political content"                   onchange="anyChange()"/> Political content</label>
        <label class="check-item"><input type="checkbox" id="ct-self"         value="Sent to self"                        onchange="anyChange()"/> Sent to self</label>
      </div>
    </div>
    <div class="divider"></div>

    <!-- Attachments -->
    <div class="field-group">
      <label class="field-label">Has Attachments</label>
      <div class="radio-group">
        <label class="radio-item"><input type="radio" id="att-any"     name="b-attach" value="Any"                     checked onchange="anyChange()"/> Any</label>
        <label class="radio-item"><input type="radio" id="att-yes-any" name="b-attach" value="Yes – any"                      onchange="anyChange()"/> Yes – any</label>
        <label class="radio-item"><input type="radio" id="att-yes-sus" name="b-attach" value="Yes – suspicious/executable"    onchange="anyChange()"/> Yes – suspicious (.apk, .exe)</label>
        <label class="radio-item"><input type="radio" id="att-no"      name="b-attach" value="No"                             onchange="anyChange()"/> No</label>
      </div>
    </div>
    <div class="divider"></div>

    <!-- Read Status -->
    <div class="field-group">
      <label class="field-label">Read Status</label>
      <div class="radio-group">
        <label class="radio-item"><input type="radio" id="rs-any"    name="b-readstatus" value="Any"         checked onchange="anyChange()"/> Any</label>
        <label class="radio-item"><input type="radio" id="rs-read"   name="b-readstatus" value="Read only"           onchange="anyChange()"/> Read only</label>
        <label class="radio-item"><input type="radio" id="rs-unread" name="b-readstatus" value="Unread only"         onchange="anyChange()"/> Unread only</label>
      </div>
    </div>
    <div class="divider"></div>

    <!-- Action Status -->
    <div class="field-group">
      <label class="field-label">Action Status</label>
      <div class="radio-group">
        <label class="radio-item"><input type="radio" id="as-any"       name="b-action" value="Any"                                    checked onchange="anyChange()"/> Any</label>
        <label class="radio-item"><input type="radio" id="as-requires"  name="b-action" value="Requires action"                               onchange="anyChange()"/> Requires action</label>
        <label class="radio-item"><input type="radio" id="as-completed" name="b-action" value="No action required / already completed"         onchange="anyChange()"/> No action required</label>
      </div>
    </div>
    <div class="divider"></div>

    <!-- Exception -->
    <div>
      <button class="exc-btn" type="button" onclick="toggleException()">+ Add exception rule</button>
      <div class="exc-block" id="exception-block">
        <label class="field-label" style="margin-bottom:8px;">Keep emails matching (exception)</label>
        <input type="text" id="b-exception" placeholder="e.g. emails from boss@company.com" oninput="anyChange()"/>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn btn-primary"   id="btn-preview" type="button" onclick="previewB()" disabled>Preview results</button>
      <button class="btn btn-secondary" id="btn-add"     type="button" onclick="addRuleB()" disabled>+ Add rule</button>
    </div>
    <p class="disclaimer">No emails will be deleted. This records your preferences for research purposes.</p>

    <!-- Preview Panel -->
    <div class="preview-panel" id="preview-panel">
      <div class="preview-header">
        <span class="preview-title">Matching emails</span>
        <span class="preview-count" id="preview-count"></span>
      </div>
      <div id="preview-rows"></div>
      <p class="preview-note">In a real system, matching emails would appear here.</p>
    </div>

    <!-- ↓↓↓ DELETE THIS ENTIRE BLOCK BEFORE GOING LIVE ↓↓↓ -->
    <div class="debug-section">
      <div class="debug-label">Sending to LimeSurvey</div>
      <div class="debug-box" id="debug-b">{ "interface": "B", "rules": [] }</div>
    </div>
    <!-- ↑↑↑ DELETE THIS ENTIRE BLOCK BEFORE GOING LIVE ↑↑↑ -->

  </div>
</div>

<script>
  var rules = [];
  var lastAnswer = '';
  var lastSentHeight = 0;
  var exceptionVisible = false;

  var contentTypeIds = [
    ['ct-password','Password resets / login codes'],['ct-otp','OTP / verification codes'],
    ['ct-banking','Banking / financial'],['ct-medical','Medical / health'],
    ['ct-shopping','Shopping / purchase receipts'],['ct-travel','Travel receipts'],
    ['ct-utility','Utility bills'],['ct-insurance','Insurance'],
    ['ct-subscription','Subscription confirmations'],['ct-calendar','Calendar invites (past / completed)'],
    ['ct-job','Job application emails'],['ct-visa','Visa / immigration documents'],
    ['ct-political','Political content'],['ct-self','Sent to self']
  ];
  var categoryIds = [['cb-promo','Promotional'],['cb-social','Social'],['cb-work','Work'],['cb-other','Other']];

  function pushHeight() {
    setTimeout(function() {
      var h = document.body.scrollHeight;
      if (h !== lastSentHeight) {
        lastSentHeight = h;
        window.parent.postMessage({ lsAnswer: lastAnswer, iframeHeight: h }, '*');
      }
    }, 60);
  }

  function clearOlder() { document.getElementById('r-older').checked = false; }

  function toggleException() {
    exceptionVisible = !exceptionVisible;
    document.getElementById('exception-block').classList[exceptionVisible ? 'add' : 'remove']('visible');
    anyChange();
    pushHeight();
  }

  function getVal(id)    { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
  function isChecked(id) { var el = document.getElementById(id); return el ? el.checked : false; }

  function collectFilters() {
    var f = {};
    var sender = getVal('b-sender'); if (sender) f.sender = sender;
    var olderSel = isChecked('r-older'), olderYrs = getVal('b-older-years');
    var df = getVal('b-date-from'), dt = getVal('b-date-to');
    if (olderSel && olderYrs) f.date = { mode:'older_than', years:Number(olderYrs) };
    else if (df||dt) f.date = { mode:'range', from:df||null, to:dt||null };
    var kw = getVal('b-keywords'); if (kw) f.keywords = kw;
    var cats = []; categoryIds.forEach(function(c){ if(isChecked(c[0])) cats.push(c[1]); }); if(cats.length) f.categories = cats;
    var ct = []; contentTypeIds.forEach(function(c){ if(isChecked(c[0])) ct.push(c[1]); }); if(ct.length) f.contentType = ct;
    if (isChecked('att-yes-any')) f.attachments = 'Yes – any';
    else if (isChecked('att-yes-sus')) f.attachments = 'Yes – suspicious/executable';
    else if (isChecked('att-no')) f.attachments = 'No';
    if (isChecked('rs-read')) f.readStatus = 'Read only';
    else if (isChecked('rs-unread')) f.readStatus = 'Unread only';
    if (isChecked('as-requires')) f.actionStatus = 'Requires action';
    else if (isChecked('as-completed')) f.actionStatus = 'No action required / already completed';
    if (exceptionVisible) { var exc = getVal('b-exception'); if(exc) f.exception = exc; }
    return f;
  }

  function hasAnyInput() { return Object.keys(collectFilters()).length > 0; }

  // anyChange: enable/disable buttons AND save current state immediately
  function anyChange() {
    var has = hasAnyInput();
    document.getElementById('btn-preview').disabled = !has;
    document.getElementById('btn-add').disabled = !has;

    // Save current filters + any committed rules to LimeSurvey immediately
    var current = has ? rules.concat([collectFilters()]) : rules.slice();
    lastAnswer = JSON.stringify({ interface: 'B', rules: current });
    window.parent.postMessage({ lsAnswer: lastAnswer, iframeHeight: lastSentHeight }, '*');
    var db = document.getElementById('debug-b'); if (db) db.textContent = JSON.stringify({ interface: 'B', rules: current }, null, 2);
  }

  function chipLabel(f) {
    var p = [];
    if (f.sender) p.push(f.sender);
    if (f.categories) p.push(f.categories.join(', '));
    if (f.contentType) p.push(f.contentType.slice(0,2).join(', ') + (f.contentType.length>2?' +'+(f.contentType.length-2):''));
    if (f.keywords) p.push('"'+f.keywords+'"');
    if (f.date) p.push(f.date.mode==='older_than'?'Older than '+f.date.years+'y':'Date range');
    if (f.attachments) p.push('Attachments: '+f.attachments);
    if (f.readStatus) p.push(f.readStatus);
    if (f.actionStatus) p.push(f.actionStatus);
    if (f.exception) p.push('Except: '+f.exception);
    return p.join(' · ') || 'Rule';
  }

  function addRuleB() {
    var filters = collectFilters();
    if (!Object.keys(filters).length) return;
    rules.push(filters);
    renderChips();
    resetForm();
    hidePreview();
    sync();
    pushHeight();
  }

  function previewB() {
    if (!hasAnyInput()) return;
    var filters = collectFilters();
    var current = rules.concat([filters]);
    lastAnswer = JSON.stringify({ interface: 'B', rules: current });
    window.parent.postMessage({ lsAnswer: lastAnswer, iframeHeight: lastSentHeight }, '*');
    var db = document.getElementById('debug-b'); if (db) db.textContent = JSON.stringify({ interface: 'B', rules: current }, null, 2);
    showPreview();
    pushHeight();
  }

  function removeRule(index) {
    rules.splice(index, 1);
    renderChips();
    hidePreview();
    sync();
    pushHeight();
  }

  function resetForm() {
    document.getElementById('b-sender').value = '';
    document.getElementById('b-date-from').value = '';
    document.getElementById('b-date-to').value = '';
    document.getElementById('b-older-years').value = '';
    document.getElementById('r-older').checked = false;
    document.getElementById('b-keywords').value = '';
    categoryIds.forEach(function(c){ document.getElementById(c[0]).checked = false; });
    contentTypeIds.forEach(function(c){ document.getElementById(c[0]).checked = false; });
    document.getElementById('att-any').checked = true;
    document.getElementById('rs-any').checked  = true;
    document.getElementById('as-any').checked  = true;
    if (exceptionVisible) document.getElementById('b-exception').value = '';
    document.getElementById('btn-preview').disabled = true;
    document.getElementById('btn-add').disabled = true;
  }

  function renderChips() {
    var list = document.getElementById('rules-list');
    list.innerHTML = '';
    rules.forEach(function(rule, i) {
      var label = chipLabel(rule);
      var chip  = document.createElement('div');
      chip.className = 'rule-chip';
      chip.innerHTML = '<span title="'+label+'">'+label+'</span><button class="rule-chip-remove" onclick="removeRule('+i+')" title="Remove">×</button>';
      list.appendChild(chip);
    });
  }

  function showPreview() {
    var rowsEl = document.getElementById('preview-rows');
    var count = Math.floor(Math.random()*5)+3;
    document.getElementById('preview-count').textContent = count+' emails found';
    rowsEl.innerHTML = '';
    for (var i=0; i<Math.min(count,4); i++) {
      rowsEl.innerHTML += '<div class="preview-row"><div class="preview-avatar"></div><div class="preview-info"><div class="preview-sender"></div><div class="preview-subject" style="width:'+(45+Math.random()*35)+'%"></div></div><div class="preview-date"></div></div>';
    }
    document.getElementById('preview-panel').classList.add('visible');
  }

  function hidePreview() { document.getElementById('preview-panel').classList.remove('visible'); }

  function sync() {
    lastAnswer = JSON.stringify({ interface: 'B', rules: rules });
    window.parent.postMessage({ lsAnswer: lastAnswer, iframeHeight: lastSentHeight }, '*');
    var db = document.getElementById('debug-b'); if (db) db.textContent = JSON.stringify({ interface: 'B', rules: rules }, null, 2);
  }

  window.addEventListener('load', function() {
    setTimeout(function() {
      var h = document.body.scrollHeight;
      lastSentHeight = h;
      window.parent.postMessage({ lsAnswer: lastAnswer, iframeHeight: h }, '*');
    }, 100);
  });
</script>
</body>
</html>
