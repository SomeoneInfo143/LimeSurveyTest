<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --surface: #ffffff; --border: #e2e0db; --border-focus: #1a1a1a;
    --text: #1a1a1a; --text-muted: #6b6860;
    --chip-bg: #f0ede8; --chip-text: #4a4845;
    --danger: #c0392b; --danger-hover: #a93226;
    --radius-sm: 5px; --shadow: 0 1px 3px rgba(0,0,0,0.07);
  }
  body { font-family: 'DM Sans', sans-serif; background: #f5f4f1; color: var(--text); padding: 24px 16px; margin: 0; }
  .iface-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); max-width: 560px; margin: 0 auto; overflow: hidden; }
  .iface-card-header { padding: 16px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .iface-badge { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; background: var(--chip-bg); color: var(--chip-text); font-family: 'DM Mono', monospace; }
  .iface-card-title { font-size: 13px; font-weight: 600; }
  .iface-card-body { padding: 20px; }
  .iface-field-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 7px; }
  #nl-input { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; outline: none; resize: vertical; min-height: 90px; line-height: 1.55; transition: border-color .15s; box-sizing: border-box; }
  #nl-input:focus { border-color: var(--border-focus); }
  #nl-input::placeholder { color: #b0ada8; }
  .iface-examples { margin: 12px 0 0; }
  .iface-examples-label { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .iface-example-list { display: flex; flex-direction: column; gap: 4px; }
  .iface-example-item { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--chip-text); background: var(--chip-bg); border-radius: 4px; padding: 5px 10px; line-height: 1.4; }
  .iface-action-row { margin-top: 20px; }
  .iface-btn-danger { width: 100%; padding: 10px 16px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; border-radius: var(--radius-sm); border: none; cursor: pointer; background: var(--danger); color: #fff; transition: background .15s, transform .1s; }
  .iface-btn-danger:hover { background: var(--danger-hover); }
  .iface-btn-danger:active { transform: scale(.98); }
  .iface-debug-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .iface-debug-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .iface-debug-box { background: #1a1a1a; color: #a8e6a3; font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.6; padding: 10px 12px; border-radius: var(--radius-sm); white-space: pre-wrap; word-break: break-all; min-height: 36px; }
</style>
</head>
<body>
<div class="iface-card">
  <div class="iface-card-header">
    <span class="iface-badge">Interface A</span>
    <span class="iface-card-title">Open-Ended</span>
  </div>
  <div class="iface-card-body">
    <div>
      <label class="iface-field-label">Describe which emails you want to delete</label>
      <textarea id="nl-input" placeholder="Describe what you want to remove..." oninput="syncA()"></textarea>
    </div>
    <div class="iface-examples">
      <div class="iface-examples-label">Examples of what you can say</div>
      <div class="iface-example-list">
        <div class="iface-example-item">"Delete emails from 2020 and earlier"</div>
        <div class="iface-example-item">"Remove promotional emails and newsletters"</div>
        <div class="iface-example-item">"Delete emails about my old job but keep important ones"</div>
      </div>
    </div>
    <div class="iface-action-row">
      <button class="iface-btn-danger" type="button" onclick="syncA()">Delete</button>
    </div>
    <!-- Remove this debug section before going live -->
    <div class="iface-debug-section">
      <div class="iface-debug-label">Sending to LimeSurvey</div>
      <div class="iface-debug-box" id="debug-a">{ "interface": "A", "query": "" }</div>
    </div>
  </div>
</div>
<script>
  function syncA() {
    var query = document.getElementById('nl-input').value.trim();
    var data = JSON.stringify({ interface: 'A', query: query });
    // Send to LimeSurvey parent page
    window.parent.postMessage({ lsAnswer: data }, '*');
    // Debug
    document.getElementById('debug-a').textContent = JSON.stringify({ interface: 'A', query: query }, null, 2);
  }
</script>
</body>
</html>
